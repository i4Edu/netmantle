# Builds tagged releases, generates an SBOM, and publishes signed
# artifacts. Cosign keyless signing uses the workflow OIDC identity, so no
# secrets are required in this repository.
#
# This workflow is part of NetMantle's Phase 10 hardening: every release
# artifact is signed and accompanied by an SPDX SBOM (syft).
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              out="dist/netmantle-${os}-${arch}"
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath \
                -ldflags="-s -w -X github.com/i4Edu/netmantle/internal/version.Version=${GITHUB_REF_NAME}" \
                -o "$out" ./cmd/netmantle
              (cd dist && sha256sum "$(basename "$out")" >> SHA256SUMS)
            done
          done

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/netmantle.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in dist/netmantle-*-* dist/netmantle.spdx.json; do
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.pem" "$f"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/netmantle-*-*
            dist/SHA256SUMS
            dist/netmantle.spdx.json
            dist/*.sig
            dist/*.pem
