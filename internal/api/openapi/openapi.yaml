openapi: 3.0.3
info:
  title: NetMantle API
  version: "0.1.0"
  description: |
    REST API for the NetMantle network configuration management platform.
    All endpoints are prefixed with `/api/v1`. Authentication is via the
    `netmantle_session` cookie obtained from `POST /auth/login`.
servers:
  - url: /api/v1
security:
  - cookieAuth: []
paths:
  /auth/login:
    post:
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200': {description: Logged in, sets the session cookie}
        '401': {description: Invalid credentials}
  /auth/logout:
    post:
      summary: Log out the current session
      responses:
        '204': {description: Logged out}
  /auth/me:
    get:
      summary: Return the authenticated user
      responses:
        '200':
          description: The current user
          content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}
  /devices:
    get:
      summary: List devices
      responses:
        '200':
          description: Devices
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Device'}}}}
    post:
      summary: Create a device
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/DeviceInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}
  /devices/{id}:
    get:
      summary: Get a device
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}}
        '404': {description: Not found}
    put:
      summary: Update a device
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/DeviceInput'}}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}}
    delete:
      summary: Delete a device
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Deleted}
  /devices/{id}/backup:
    post:
      summary: Trigger a backup of a device
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200':
          description: Backup completed
          content: {application/json: {schema: {$ref: '#/components/schemas/BackupRun'}}}
  /devices/{id}/runs:
    get:
      summary: List recent backup runs for a device
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200':
          description: Runs
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/BackupRun'}}}}
  /devices/{id}/config:
    get:
      summary: Get the latest stored configuration for a device
      parameters:
        - {$ref: '#/components/parameters/Id'}
        - {in: query, name: artifact, schema: {type: string, default: running-config}}
      responses:
        '200':
          description: Raw configuration text
          content: {text/plain: {schema: {type: string}}}
  /device-groups:
    get:
      summary: List device groups
      responses:
        '200':
          description: Groups
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Group'}}}}
    post:
      summary: Create a device group
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/GroupInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Group'}}}
  /credentials:
    get:
      summary: List credentials (metadata only — secrets never leave the server)
      responses:
        '200':
          description: Credentials
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Credential'}}}}
    post:
      summary: Create a credential
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/CredentialInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Credential'}}}
  /credentials/{id}:
    delete:
      summary: Delete a credential
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Deleted}
  /drivers:
    get:
      summary: List built-in drivers
      responses:
        '200':
          description: Driver names
          content: {application/json: {schema: {type: array, items: {type: string}}}}
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: netmantle_session
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: {type: integer, format: int64}
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: {type: string}
        password: {type: string, format: password}
    User:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        username: {type: string}
        role: {type: string, enum: [admin, operator, viewer]}
    DeviceInput:
      type: object
      required: [hostname, address, driver]
      properties:
        hostname: {type: string}
        address: {type: string}
        port: {type: integer, default: 22}
        driver: {type: string}
        group_id: {type: integer, format: int64, nullable: true}
        credential_id: {type: integer, format: int64, nullable: true}
    Device:
      allOf:
        - {$ref: '#/components/schemas/DeviceInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    GroupInput:
      type: object
      required: [name]
      properties:
        name: {type: string}
    Group:
      allOf:
        - {$ref: '#/components/schemas/GroupInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    CredentialInput:
      type: object
      required: [name, username, secret]
      properties:
        name: {type: string}
        username: {type: string}
        secret: {type: string, format: password, description: 'Plaintext on the wire; encrypted at rest.'}
    Credential:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        name: {type: string}
        username: {type: string}
        created_at: {type: string, format: date-time}
    BackupRun:
      type: object
      properties:
        id: {type: integer, format: int64}
        device_id: {type: integer, format: int64}
        started_at: {type: string, format: date-time}
        finished_at: {type: string, format: date-time}
        status: {type: string, enum: [running, success, failed]}
        error: {type: string, nullable: true}
        commit_sha: {type: string, nullable: true}

# -------------------------------------------------------------------------
# Phase 2..10 endpoints. Path-only sketch — full schemas live in code.
# Auto-generation of this section from the handlers is a follow-up.
# -------------------------------------------------------------------------
  /api/v1/changes:
    get: { summary: List ChangeEvents, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
  /api/v1/changes/{id}/diff:
    get:
      summary: Get unified diff for a ChangeEvent
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'200': {description: text/plain diff}}
  /api/v1/notifications/channels:
    get: { summary: List notification channels, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create notification channel, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/notifications/rules:
    get: { summary: List notification rules, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create notification rule, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/search:
    get:
      summary: Full-text search across stored configs
      security: [{cookieAuth: []}]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer}}
      responses: {'200': {description: OK}}
  /api/v1/search/saved:
    get: { summary: List saved searches, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Save a search, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/changes.csv:
    get: { summary: Export changes as CSV, security: [{cookieAuth: []}], responses: {'200': {description: text/csv}} }
  /api/v1/compliance/rules:
    get: { summary: List compliance rules, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create a compliance rule, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/compliance/findings:
    get: { summary: List current compliance findings, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
  /api/v1/discovery/scans:
    post: { summary: Start a discovery scan, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
  /api/v1/discovery/import/netbox:
    post: { summary: Import devices from a NetBox JSON dump, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
  /api/v1/push/jobs:
    get: { summary: List push jobs, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create a push job, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/push/jobs/{id}/preview:
    post:
      summary: Preview rendered config per device
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'200': {description: OK}}
  /api/v1/push/jobs/{id}/run:
    post:
      summary: Execute a push job (preview-only in this MVP — see roadmap)
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'200': {description: OK}}
  /api/v1/pollers:
    get: { summary: List remote pollers, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Register a remote poller, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/devices/{id}/terminal:
    get:
      summary: WebSocket upgrade to an in-app device terminal
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'101': {description: Switching Protocols}}
  /api/v1/probes:
    get: { summary: List probes, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create a probe, security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/probes/{id}/runs:
    get:
      summary: List recent probe runs
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'200': {description: OK}}
  /api/v1/tenants:
    get: { summary: List tenants (admin), security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    post: { summary: Create tenant (admin), security: [{cookieAuth: []}], responses: {'201': {description: Created}} }
  /api/v1/tenants/{id}/quota:
    put:
      summary: Set per-tenant device quota (admin)
      security: [{cookieAuth: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'204': {description: No Content}}
  /api/v1/topology:
    get: { summary: LLDP/CDP topology graph, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
  /api/v1/gitops/mirror:
    get: { summary: Get GitOps mirror config, security: [{cookieAuth: []}], responses: {'200': {description: OK}} }
    put: { summary: Configure GitOps mirror (admin), security: [{cookieAuth: []}], responses: {'204': {description: No Content}} }
