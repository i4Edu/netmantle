openapi: 3.0.3
info:
  title: NetMantle API
  version: "0.1.0"
  description: |
    REST API for the NetMantle network configuration management platform.
    All endpoints are prefixed with `/api/v1`. Authentication is via the
    `netmantle_session` cookie obtained from `POST /auth/login`.

    ## Stability policy (pre-v1)

    Endpoints marked `x-stability: frozen` have stable request/response
    contracts as of this version. Breaking changes to these endpoints require
    a new major API version. All other endpoints may evolve until the first
    stable tag.

    Storage schema changes follow the same policy: migration files are
    append-only. Any schema evolution must include compatibility notes and
    rollback expectations in the same PR.
servers:
  - url: /api/v1
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Log in
      x-stability: frozen
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200': {description: Logged in, sets the session cookie}
        '401': {description: Invalid credentials}
  /auth/logout:
    post:
      summary: Log out the current session
      x-stability: frozen
      responses:
        '204': {description: Logged out}
  /auth/me:
    get:
      summary: Return the authenticated user
      x-stability: frozen
      responses:
        '200':
          description: The current user
          content: {application/json: {schema: {$ref: '#/components/schemas/User'}}}
  /devices:
    get:
      summary: List devices
      x-stability: frozen
      responses:
        '200':
          description: Devices
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Device'}}}}
    post:
      summary: Create a device
      x-stability: frozen
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/DeviceInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}
  /devices/{id}:
    get:
      summary: Get a device
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}}
        '404': {description: Not found}
    put:
      summary: Update a device
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/DeviceInput'}}}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/Device'}}}}
    delete:
      summary: Delete a device
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Deleted}
  /devices/{id}/backup:
    post:
      summary: Trigger a backup of a device
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200':
          description: Backup completed
          content: {application/json: {schema: {$ref: '#/components/schemas/BackupRun'}}}
  /devices/{id}/runs:
    get:
      summary: List recent backup runs for a device
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200':
          description: Runs
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/BackupRun'}}}}
  /devices/{id}/config:
    get:
      summary: Get the latest stored configuration for a device
      x-stability: frozen
      parameters:
        - {$ref: '#/components/parameters/Id'}
        - {in: query, name: artifact, schema: {type: string, default: running-config}}
      responses:
        '200':
          description: Raw configuration text
          content: {text/plain: {schema: {type: string}}}
  /device-groups:
    get:
      summary: List device groups
      x-stability: frozen
      responses:
        '200':
          description: Groups
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Group'}}}}
    post:
      summary: Create a device group
      x-stability: frozen
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/GroupInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Group'}}}
  /credentials:
    get:
      summary: List credentials (metadata only — secrets never leave the server)
      x-stability: frozen
      responses:
        '200':
          description: Credentials
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Credential'}}}}
    post:
      summary: Create a credential
      x-stability: frozen
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/CredentialInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/Credential'}}}
  /credentials/{id}:
    delete:
      summary: Delete a credential
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Deleted}
  /drivers:
    get:
      summary: List built-in drivers
      x-stability: frozen
      responses:
        '200':
          description: Driver names
          content: {application/json: {schema: {type: array, items: {type: string}}}}

  /audit:
    get:
      summary: List audit log entries (most recent first)
      description: |
        Returns audit_log entries scoped to the caller's tenant. Every
        mutating handler writes here (device.create / device.update /
        device.delete / credential.create / credential.delete /
        device.backup.request / device.backup / device_group.create) so
        the same endpoint feeds the reviewer-facing Audit page and any
        external SIEM integration.
      x-stability: experimental
      parameters:
        - {in: query, name: user,   schema: {type: integer, format: int64}, description: Actor user id (exact)}
        - {in: query, name: action, schema: {type: string},                description: 'Action key, exact (e.g. device.create)'}
        - {in: query, name: target, schema: {type: string},                description: 'Substring match on target (e.g. device:42)'}
        - {in: query, name: since,  schema: {type: string, format: date-time}, description: RFC3339 lower bound (inclusive)}
        - {in: query, name: until,  schema: {type: string, format: date-time}, description: RFC3339 upper bound (inclusive)}
        - {in: query, name: limit,  schema: {type: integer, default: 100, maximum: 500}}
        - {in: query, name: offset, schema: {type: integer, default: 0,   minimum: 0}}
        - in: query
          name: format
          schema: {type: string, enum: [json, csv]}
          description: |
            Response format. Defaults to JSON. When `csv` the same filtered
            rows are streamed as text/csv with the columns
            `id,created_at,tenant_id,actor_user_id,source,action,target,request_id,detail`.
            The Content-Disposition header asks the browser to download.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/AuditEntry'}}
            text/csv:
              schema: {type: string, format: binary}
        '400': {description: Invalid filter value}

  # -------------------------------------------------------------------------
  # Dashboard summary (reviewer landing page)
  # -------------------------------------------------------------------------
  /dashboard/summary:
    get:
      summary: Aggregated dashboard payload
      description: |
        Returns the pre-aggregated counts, sparkline series, recent events,
        per-driver compliance bars, drift hotspots, and cluster-health
        snapshot used to render the landing page in a single round-trip.

        All aggregation runs server-side; the client only renders SVG and
        HTML. Every section is best-effort: an individual sub-query failure
        zeros out that section but still returns 200.
      x-stability: experimental
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -------------------------------------------------------------------------
  # Phase 2 — change events & notifications
  # -------------------------------------------------------------------------
  /changes:
    get:
      summary: List ChangeEvents (most recent first)
      x-stability: frozen
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/ChangeEvent'}}
  /changes/{id}/diff:
    get:
      summary: Get unified diff for a ChangeEvent
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200':
          description: Unified diff as plain text
          content: {text/plain: {schema: {type: string}}}
        '404': {description: Event not found or not in caller's tenant}
  /changes/{id}/review:
    post:
      summary: Mark a ChangeEvent as reviewed
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Marked reviewed}
  /notifications/channels:
    get:
      summary: List notification channels
      x-stability: frozen
      responses: {'200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/NotificationChannel'}}}}}}
    post:
      summary: Create notification channel
      x-stability: frozen
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/NotificationChannelInput'}}}
      responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/NotificationChannel'}}}}}
  /notifications/channels/{id}:
    delete:
      summary: Delete a notification channel
      x-stability: frozen
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Deleted}}
  /notifications/rules:
    get:
      summary: List notification rules
      x-stability: frozen
      responses: {'200': {description: OK}}
    post:
      summary: Create notification rule
      x-stability: frozen
      responses: {'201': {description: Created}}

  # -------------------------------------------------------------------------
  # Phase 3 — search & export
  # -------------------------------------------------------------------------
  /search:
    get:
      summary: Full-text search across stored configs
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, default: 50}}
      responses: {'200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/SearchHit'}}}}}}
  /search/saved:
    get:
      summary: List saved searches
      responses: {'200': {description: OK}}
    post:
      summary: Save a search
      responses: {'201': {description: Created}}
  /changes.csv:
    get:
      summary: Export changes as CSV
      responses: {'200': {description: text/csv}}

  # -------------------------------------------------------------------------
  # Phase 4 — compliance
  # -------------------------------------------------------------------------
  /compliance/rules:
    get:
      summary: List compliance rules
      responses: {'200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/ComplianceRule'}}}}}}
    post:
      summary: Create a compliance rule
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ComplianceRuleInput'}}}
      responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/ComplianceRule'}}}}}
  /compliance/rules/{id}:
    delete:
      summary: Delete a compliance rule
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Deleted}}
  /compliance/findings:
    get:
      summary: List current compliance findings
      responses: {'200': {description: OK, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/ComplianceFinding'}}}}}}

  # -------------------------------------------------------------------------
  # Phase 5 — discovery
  # -------------------------------------------------------------------------
  /discovery/scans:
    post:
      summary: Start a discovery scan
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ScanInput'}}}
      responses: {'200': {description: OK}}
  /discovery/import/netbox:
    post:
      summary: Import devices from a NetBox JSON dump
      responses: {'200': {description: OK}}

  # -------------------------------------------------------------------------
  # Phase 6 — push automation
  # -------------------------------------------------------------------------
  /push/jobs:
    get:
      summary: List push jobs
      responses: {'200': {description: OK}}
    post:
      summary: Create a push job
      responses: {'201': {description: Created}}
  /push/jobs/{id}/preview:
    post:
      summary: Preview rendered config per device
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: OK}}
  /push/jobs/{id}/run:
    post:
      summary: Execute a push job (applies rendered config to each targeted device)
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: OK}}

  # -------------------------------------------------------------------------
  # Phase 7 — pollers + terminal
  # -------------------------------------------------------------------------
  /pollers:
    get:
      summary: List remote pollers
      responses: {'200': {description: OK}}
    post:
      summary: Register a remote poller
      description: |
        Returns a one-time bootstrap token in the response body. Store this
        token immediately — it will not be shown again. The token is used by
        the poller agent to authenticate its heartbeat calls.
      responses: {'201': {description: Created}}
  /pollers/{id}:
    delete:
      summary: Delete a remote poller
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Deleted}}
  /devices/{id}/terminal:
    get:
      summary: WebSocket upgrade to an in-app device terminal
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'101': {description: Switching Protocols}}

  # -------------------------------------------------------------------------
  # Phase 8 — probes
  # -------------------------------------------------------------------------
  /probes:
    get:
      summary: List probes
      responses: {'200': {description: OK}}
    post:
      summary: Create a probe
      responses: {'201': {description: Created}}
  /probes/{id}:
    delete:
      summary: Delete a probe
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Deleted}}
  /probes/{id}/runs:
    get:
      summary: List recent probe runs
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: OK}}

  # -------------------------------------------------------------------------
  # Phase 9 — tenants & quotas
  # -------------------------------------------------------------------------
  /tenants:
    get:
      summary: List tenants (admin only)
      responses: {'200': {description: OK}}
    post:
      summary: Create tenant (admin only)
      responses: {'201': {description: Created}}
  /tenants/{id}/quota:
    put:
      summary: Set per-tenant device quota (admin only)
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: No Content}}

  # -------------------------------------------------------------------------
  # Phase 10 — topology + GitOps mirror
  # -------------------------------------------------------------------------
  /topology:
    get:
      summary: LLDP/CDP topology graph (API-first; visualization UI is a follow-up)
      responses: {'200': {description: OK, content: {application/json: {schema: {$ref: '#/components/schemas/TopologyGraph'}}}}}
  /gitops/mirror:
    get:
      summary: Get GitOps mirror config
      responses: {'200': {description: OK}}
    put:
      summary: Configure GitOps mirror (admin only)
      responses: {'204': {description: No Content}}

  # ----------------------------------------------------------------
  # Approval workflow (Phase B) and rollback (Phase D).
  # ----------------------------------------------------------------
  /change-requests:
    get:
      summary: List change requests for the caller's tenant
      parameters:
        - in: query
          name: status
          schema: {type: string, enum: [draft, submitted, approved, rejected, applied, failed, cancelled]}
      responses:
        '200':
          description: OK
          content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/ChangeRequest'}}}}
    post:
      summary: Create a change request (initial state is `draft`)
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ChangeRequestInput'}}}
      responses:
        '201':
          description: Created
          content: {application/json: {schema: {$ref: '#/components/schemas/ChangeRequest'}}}
  /change-requests/{id}:
    parameters: [{$ref: '#/components/parameters/Id'}]
    get:
      summary: Get a change request and its event timeline
      responses: {'200': {description: OK}}
  /change-requests/{id}/submit:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Submit a draft for review
      responses: {'200': {description: OK}, '409': {description: Invalid transition}}
  /change-requests/{id}/approve:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Approve a submitted request (admin only; non-admin reviewer cannot self-approve)
      requestBody:
        content: {application/json: {schema: {type: object, properties: {reason: {type: string}}}}}
      responses:
        '200': {description: OK}
        '403': {description: Self-approval forbidden}
        '409': {description: Invalid transition}
  /change-requests/{id}/reject:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Reject a submitted request (admin only)
      responses: {'200': {description: OK}}
  /change-requests/{id}/cancel:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Cancel a non-terminal request (requester or admin)
      responses: {'200': {description: OK}}
  /change-requests/{id}/apply:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Apply an approved request via the executor
      responses:
        '200': {description: Applied}
        '409': {description: Not in approved state}
        '502': {description: Executor failed}
  /devices/{id}/rollback:
    parameters: [{$ref: '#/components/parameters/Id'}]
    post:
      summary: Roll a device back to a historical config version
      description: |
        Creates a `kind=rollback` ChangeRequest carrying the historical config
        bytes. By default the request is left in `draft` state and must be
        submitted + approved before apply. Admins may pass `immediate=true`
        to short-circuit the queue (still audited).
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/RollbackInput'}}}
      responses:
        '201': {description: Created (queued)}
        '200': {description: Applied (immediate=true, admin only)}
        '403': {description: Immediate rollback requires admin}
        '404': {description: Historical version not found}

  # ----------------------------------------------------------------
  # API tokens (Phase E).
  # ----------------------------------------------------------------
  /api-tokens:
    get:
      summary: List API tokens for the caller's tenant
      responses: {'200': {description: OK}}
    post:
      summary: Issue a new API token (the secret is returned exactly once)
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/APITokenInput'}}}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: {$ref: '#/components/schemas/APIToken'}
                  secret: {type: string, description: 'Bearer secret. Store now — never shown again.'}
                  warning: {type: string}
  /api-tokens/{id}:
    parameters: [{$ref: '#/components/parameters/Id'}]
    delete:
      summary: Revoke a token
      responses: {'204': {description: No Content}}

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: netmantle_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: nmt_<prefix>_<secret>
      description: |
        Long-lived API token issued via `POST /api-tokens`. Use for
        machine-to-machine integrations (billing, provisioning, CI). Tokens
        are scoped; admin sessions implicitly grant every scope.
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: {type: integer, format: int64}
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: {type: string}
        password: {type: string, format: password}
    User:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        username: {type: string}
        role: {type: string, enum: [admin, operator, viewer]}
    DeviceInput:
      type: object
      required: [hostname, address, driver]
      properties:
        hostname: {type: string}
        address: {type: string}
        port: {type: integer, default: 22}
        driver: {type: string}
        group_id: {type: integer, format: int64, nullable: true}
        credential_id: {type: integer, format: int64, nullable: true}
    Device:
      allOf:
        - {$ref: '#/components/schemas/DeviceInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    GroupInput:
      type: object
      required: [name]
      properties:
        name: {type: string}
    Group:
      allOf:
        - {$ref: '#/components/schemas/GroupInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    CredentialInput:
      type: object
      required: [name, username, secret]
      properties:
        name: {type: string}
        username: {type: string}
        secret: {type: string, format: password, description: 'Plaintext on the wire; encrypted at rest.'}
    Credential:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        name: {type: string}
        username: {type: string}
        created_at: {type: string, format: date-time}
    BackupRun:
      type: object
      properties:
        id: {type: integer, format: int64}
        device_id: {type: integer, format: int64}
        started_at: {type: string, format: date-time}
        finished_at: {type: string, format: date-time}
        status: {type: string, enum: [running, success, failed]}
        error: {type: string, nullable: true}
        commit_sha: {type: string, nullable: true}
    AuditEntry:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64, nullable: true}
        actor_user_id: {type: integer, format: int64, nullable: true}
        action: {type: string, example: device.create}
        target: {type: string, example: 'device:42'}
        detail: {type: string}
        source: {type: string, enum: [ui, api, scheduler, poller, system, backup]}
        created_at: {type: string, format: date-time}
    ChangeEvent:
      type: object
      properties:
        id: {type: integer, format: int64}
        device_id: {type: integer, format: int64}
        artifact: {type: string, example: running-config}
        old_sha: {type: string, nullable: true}
        new_sha: {type: string}
        added_lines: {type: integer}
        removed_lines: {type: integer}
        reviewed: {type: boolean}
        created_at: {type: string, format: date-time}
    NotificationChannelInput:
      type: object
      required: [name, kind, config]
      properties:
        name: {type: string}
        kind: {type: string, enum: [webhook, slack, email]}
        config: {type: object, description: 'Channel-specific configuration (URL, token, etc.). For email channels, if a plaintext "password" field is provided it is automatically moved to "password_envelope" (envelope-encrypted); the plaintext field is not stored. For webhook and slack channels, all fields (including any URL tokens) are stored as provided — treat the database file as a secret.'}
    NotificationChannel:
      allOf:
        - {$ref: '#/components/schemas/NotificationChannelInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    SearchHit:
      type: object
      properties:
        device_id: {type: integer, format: int64}
        artifact: {type: string}
        commit_sha: {type: string}
        snippet: {type: string, description: Matching excerpt from the stored config}
    ComplianceRuleInput:
      type: object
      required: [name, kind, pattern]
      properties:
        name: {type: string}
        kind: {type: string, enum: [regex, must_include, must_exclude, ordered_block]}
        pattern: {type: string, description: 'Regex, literal string, or JSON array of lines for ordered_block'}
        severity: {type: string, enum: [low, medium, high, critical], default: medium}
        description: {type: string}
    ComplianceRule:
      allOf:
        - {$ref: '#/components/schemas/ComplianceRuleInput'}
        - type: object
          properties:
            id: {type: integer, format: int64}
            tenant_id: {type: integer, format: int64}
            created_at: {type: string, format: date-time}
    ComplianceFinding:
      type: object
      properties:
        device_id: {type: integer, format: int64}
        rule_id: {type: integer, format: int64}
        status: {type: string, enum: [pass, fail]}
        detail: {type: string, nullable: true}
    ScanInput:
      type: object
      required: [cidr]
      properties:
        cidr: {type: string, example: '10.0.0.0/24'}
        port: {type: integer, default: 22}
    TopologyGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
        edges:
          type: array
          items:
            type: object
            properties:
              source: {type: string}
              target: {type: string}
              local_port: {type: string}
              remote_port: {type: string}

    ChangeRequestInput:
      type: object
      required: [kind, title]
      properties:
        kind: {type: string, enum: [push, rollback]}
        title: {type: string}
        description: {type: string}
        push_job_id: {type: integer, format: int64, nullable: true}
        variables:
          type: object
          additionalProperties: {type: string}
        device_id: {type: integer, format: int64, nullable: true}
        artifact: {type: string}
        target_sha: {type: string}
    ChangeRequest:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        kind: {type: string}
        title: {type: string}
        description: {type: string}
        requester_id: {type: integer, format: int64}
        reviewer_id: {type: integer, format: int64, nullable: true}
        status: {type: string}
        decision_reason: {type: string}
        push_job_id: {type: integer, format: int64, nullable: true}
        device_id: {type: integer, format: int64, nullable: true}
        artifact: {type: string}
        target_sha: {type: string}
        result: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        submitted_at: {type: string, format: date-time, nullable: true}
        decided_at: {type: string, format: date-time, nullable: true}
        applied_at: {type: string, format: date-time, nullable: true}
    RollbackInput:
      type: object
      required: [artifact, target_sha]
      properties:
        artifact: {type: string, example: running-config}
        target_sha: {type: string}
        reason: {type: string}
        immediate: {type: boolean, description: 'Admin-only: pre-approve and apply in one call.'}
    APITokenInput:
      type: object
      required: [name]
      properties:
        name: {type: string}
        scopes:
          type: array
          items: {type: string}
          example: [device:read, changereq:approve]
        expires_at: {type: string, format: date-time}
    APIToken:
      type: object
      properties:
        id: {type: integer, format: int64}
        tenant_id: {type: integer, format: int64}
        owner_user_id: {type: integer, format: int64}
        name: {type: string}
        prefix: {type: string}
        scopes:
          type: array
          items: {type: string}
        created_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time, nullable: true}
        last_used_at: {type: string, format: date-time, nullable: true}
        revoked_at: {type: string, format: date-time, nullable: true}
