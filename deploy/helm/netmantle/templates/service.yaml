apiVersion: v1
kind: Service
metadata:
  name: {{ include "netmantle.fullname" . }}
  labels: {{- include "netmantle.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector: {{- include "netmantle.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netmantle.fullname" . }}-secrets
type: Opaque
stringData:
  master-passphrase: {{ .Values.masterPassphrase | quote }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "netmantle.fullname" . }}-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
